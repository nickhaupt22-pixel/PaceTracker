<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PaceTracker">
<title>PaceTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --orange: #e6641e;
  --orange-dark: #c0392b;
  --gold: #f0c040;
  --bg: #0a0a0f;
  --bg2: #13131f;
  --bg3: #1a1a2a;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --muted: #888;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; overflow: hidden;
  font-family: 'Barlow', sans-serif;
  background: var(--bg); color: var(--text);
}

#app { height: 100%; display: flex; flex-direction: column; overflow: hidden; }

/* ── HEADER ── */
.header {
  flex-shrink: 0;
  background: linear-gradient(135deg, #0f0f1a 0%, #1a0a0a 100%);
  border-bottom: 2px solid var(--orange);
  padding: 0 14px; height: 56px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 24px rgba(230,100,30,0.25);
  position: relative; z-index: 10;
}
.back-btn {
  background: none; border: none; color: var(--orange);
  font-size: 26px; cursor: pointer; padding: 4px 6px;
  border-radius: 6px; line-height: 1; transition: background 0.2s;
  display: none;
}
.back-btn.visible { display: block; }
.back-btn:active { background: rgba(230,100,30,0.2); }
.header-text { flex: 1; min-width: 0; }
.header-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 19px; letter-spacing: 1px;
  text-transform: uppercase; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; color: var(--orange); letter-spacing: 2.5px;
  text-transform: uppercase;
}

/* ── SCREEN WRAPPER ── */
.screen-wrap {
  flex: 1; overflow: hidden; position: relative;
}
.screen-bg {
  position: absolute; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.screen-bg img {
  width: 100%; height: 100%; object-fit: cover; opacity: 0.15;
}
.screen {
  position: absolute; inset: 0; overflow-y: auto;
  padding: 14px 14px 90px; z-index: 1;
  -webkit-overflow-scrolling: touch;
}

/* ── SECTION LABEL ── */
.section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 3px; color: var(--orange);
  text-transform: uppercase; margin: 4px 0 12px;
}

/* ── GAME / TRACK CARDS ── */
.card {
  background: linear-gradient(135deg, #13131f 0%, #16121e 100%);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 44px 14px 16px; margin-bottom: 10px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  -webkit-user-select: none; user-select: none;
}
.card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--orange);
}
.card:active { transform: scale(0.98); border-color: var(--orange); }
.card-title {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 18px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px;
}
.card-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.card-arrow {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--orange); font-size: 22px; line-height: 1;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center; padding: 70px 20px;
  font-family: 'Barlow Condensed', sans-serif;
}
.empty-icon { font-size: 52px; margin-bottom: 12px; }
.empty-text { font-size: 18px; letter-spacing: 1px; color: #555; }
.empty-sub { font-size: 13px; color: #3a3a4a; margin-top: 6px; }

/* ── LAP CARDS ── */
.laptime-card {
  background: linear-gradient(135deg, #13131f 0%, #16121e 100%);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 13px 14px; margin-bottom: 10px; overflow: hidden; position: relative;
}
.laptime-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: #333;
}
.laptime-card.gold { border-color: var(--gold); }
.laptime-card.gold::before { background: linear-gradient(180deg, var(--gold), var(--orange)); }
.laptime-rank {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  color: #666; letter-spacing: 1.5px; text-transform: uppercase;
}
.laptime-rank.gold { color: var(--gold); }
.laptime-time {
  font-family: 'Barlow Condensed', sans-serif; font-size: 30px;
  font-weight: 900; color: #fff; letter-spacing: 1px; line-height: 1.1;
}
.laptime-time.gold { color: var(--gold); }
.laptime-car {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
  font-weight: 600; color: #ddd; margin-top: 5px;
}
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.tag {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  letter-spacing: 1px; text-transform: uppercase;
}
.tag-awd { background: #1a3a6a; color: #6ab0ff; border: 1px solid #2a5aaa; }
.tag-fwd { background: #1a4a2a; color: #6adf8a; border: 1px solid #2a7a4a; }
.tag-rwd { background: #4a1a1a; color: #ff8a6a; border: 1px solid #8a3a2a; }
.tag-tuned { background: #4a3a0a; color: #ffdf4a; border: 1px solid #8a6a0a; }
.tag-weather { background: #1a2a4a; color: #8ab8ff; border: 1px solid #2a4a7a; }
.tag-stat { background: #2a1a3a; color: #c88aff; border: 1px solid #4a2a6a; }
.lap-actions {
  display: flex; gap: 6px; margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--border);
  justify-content: flex-end;
}
.lap-btn {
  background: #1a1a2a; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 700;
  padding: 5px 12px; font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s;
}
.lap-btn-edit:active { border-color: var(--orange); color: var(--orange); }
.lap-btn-del:active { border-color: #e63333; color: #e63333; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 24px; right: 20px;
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  border: none; color: white; font-size: 30px;
  cursor: pointer; box-shadow: 0 4px 24px rgba(230,100,30,0.55);
  transition: transform 0.15s; display: flex; align-items: center; justify-content: center;
  z-index: 50;
}
.fab:active { transform: scale(0.93); }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(5px); opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 22px 22px 0 0; padding: 22px 18px 36px;
  width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto;
  transform: translateY(40px); transition: transform 0.28s cubic-bezier(.22,1,.36,1);
  -webkit-overflow-scrolling: touch;
}
.overlay.open .modal { transform: translateY(0); }
.modal-title {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
  font-size: 22px; text-transform: uppercase; letter-spacing: 1px;
  color: #fff; margin-bottom: 18px;
  border-bottom: 1px solid var(--border); padding-bottom: 12px;
}
.modal-title em { color: var(--orange); font-style: normal; }

/* ── FORM ── */
.fg { margin-bottom: 13px; }
.fl {
  font-size: 10px; letter-spacing: 2.5px; color: var(--orange);
  text-transform: uppercase; margin-bottom: 6px; display: block;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
}
.fi {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 9px; padding: 11px 13px;
  font-family: 'Barlow', sans-serif; font-size: 15px; outline: none;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.fi:focus { border-color: var(--orange); }
.fi::placeholder { color: #444; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.radio-group { display: flex; gap: 7px; }
.rbtn {
  flex: 1; padding: 11px 6px; border-radius: 9px; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 15px; letter-spacing: 1px; cursor: pointer;
  transition: all 0.15s; text-align: center;
}
.rbtn.active { border-color: var(--orange); color: var(--orange); background: rgba(230,100,30,0.1); }
.weather-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.wbtn {
  padding: 8px 3px; border-radius: 9px; border: 1px solid var(--border);
  background: var(--bg); color: #aaa; font-size: 10px;
  cursor: pointer; text-align: center; transition: all 0.15s;
  font-family: 'Barlow', sans-serif; line-height: 1.3;
}
.wbtn .we { font-size: 20px; display: block; margin-bottom: 2px; }
.wbtn.active { border-color: #4a8aff; background: rgba(74,138,255,0.12); color: #8ab8ff; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.tgl {
  width: 50px; height: 28px; background: var(--border); border-radius: 14px;
  border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0;
}
.tgl.on { background: var(--orange); }
.tgl::after {
  content: ''; position: absolute; width: 22px; height: 22px;
  background: white; border-radius: 50%; top: 3px; left: 3px;
  transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.tgl.on::after { transform: translateX(22px); }
.btn-row { display: flex; gap: 10px; margin-top: 18px; }
.btn-cancel {
  flex: 1; padding: 13px; border-radius: 11px; border: 1px solid var(--border);
  background: none; color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 15px; letter-spacing: 1px; cursor: pointer;
}
.btn-save {
  flex: 2; padding: 13px; border-radius: 11px; border: none;
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  color: white; font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 15px; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  box-shadow: 0 4px 18px rgba(230,100,30,0.4);
}
.btn-save:active { opacity: 0.85; }

/* ── IMAGE UPLOAD ── */
.img-upload-area {
  position: relative; border-radius: 10px; overflow: hidden;
}
.img-upload-visual {
  border: 2px dashed var(--border); border-radius: 10px;
  padding: 18px; display: flex; flex-direction: column;
  align-items: center; gap: 6px; background: var(--bg);
  pointer-events: none;
}
.img-upload-area input[type=file] {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; font-size: 0;
}
.img-upload-icon { font-size: 26px; }
.img-upload-text { font-size: 12px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; }
.img-preview-wrap { position: relative; }
.img-preview { width: 100%; max-height: 130px; object-fit: cover; border-radius: 10px; display: block; }
.img-remove {
  position: absolute; top: 7px; right: 7px;
  background: rgba(0,0,0,0.75); border: 1px solid #666; color: #fff;
  border-radius: 50%; width: 26px; height: 26px; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #1e2a1e; border: 1px solid #2a5a2a; color: #6adf8a;
  padding: 10px 20px; border-radius: 30px; font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; letter-spacing: 1px; z-index: 300;
  opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
    <div class="header-text">
      <div class="header-title" id="headerTitle">🏁 PaceTracker</div>
      <div class="header-sub" id="headerSub">Racing Games</div>
    </div>
  </div>

  <div class="screen-wrap">
    <div class="screen-bg" id="screenBg" style="display:none"><img id="screenBgImg" src="" alt=""></div>
    <div class="screen" id="screen"></div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// SERVICE WORKER (inline via Blob)
// ═══════════════════════════════════════════
const swCode = `
const CACHE = 'pacetracker-v1';
const ASSETS = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request))));
});
`;
if ('serviceWorker' in navigator) {
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ═══════════════════════════════════════════
// WEB APP MANIFEST (inline)
// ═══════════════════════════════════════════
const manifest = {
  name: "PaceTracker",
  short_name: "PaceTracker",
  start_url: "./",
  display: "standalone",
  background_color: "#0a0a0f",
  theme_color: "#e6641e",
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0f'/><text y='72' x='50' text-anchor='middle' font-size='65'>🏁</text></svg>",
    sizes: "192x192", type: "image/svg+xml"
  }]
};
const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const mLink = document.createElement('link');
mLink.rel = 'manifest'; mLink.href = URL.createObjectURL(mBlob);
document.head.appendChild(mLink);

// ═══════════════════════════════════════════
// DATA & STATE
// ═══════════════════════════════════════════
const WEATHER = ['☀️ Sonnig','⛅ Bewölkt','🌧️ Regen','⛈️ Gewitter','🌙 Nacht','❄️ Schnee','🌫️ Nebel'];
const DRIVES = ['AWD','FWD','RWD'];

function loadData() {
  try { return JSON.parse(localStorage.getItem('pacetracker_data')) || { games: {}, nextId: 1 }; }
  catch { return { games: {}, nextId: 1 }; }
}
function saveData() {
  localStorage.setItem('pacetracker_data', JSON.stringify(state.data));
}

const state = {
  data: loadData(),
  view: 'games',  // 'games' | 'tracks' | 'laps'
  game: null,
  track: null,
};

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function formatTime(ms) {
  const mins = Math.floor(ms / 60000);
  const secs = ((ms % 60000) / 1000).toFixed(3).padStart(6, '0');
  return `${mins}:${secs}`;
}
function parseTimeStr(s) {
  const p = s.trim().split(':');
  if (p.length === 2) return parseFloat(p[0]) * 60000 + parseFloat(p[1]) * 1000;
  return parseFloat(s) * 1000;
}
function driveTag(d) {
  const cls = d === 'AWD' ? 'tag-awd' : d === 'FWD' ? 'tag-fwd' : 'tag-rwd';
  return `<span class="tag ${cls}">${d}</span>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function currentGame() { return state.data.games[state.game] || {}; }
function currentTrack() { return (currentGame().tracks || {})[state.track] || {}; }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function navigate(view, game, track) {
  state.view = view;
  if (game !== undefined) state.game = game;
  if (track !== undefined) state.track = track;
  render();
}
function goBack() {
  if (state.view === 'laps') navigate('tracks');
  else if (state.view === 'tracks') navigate('games');
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const backBtn = document.getElementById('backBtn');
  const title = document.getElementById('headerTitle');
  const sub = document.getElementById('headerSub');
  const bg = document.getElementById('screenBg');
  const bgImg = document.getElementById('screenBgImg');

  backBtn.classList.toggle('visible', state.view !== 'games');

  if (state.view === 'games') {
    title.textContent = '🏁 PaceTracker'; sub.textContent = 'Racing Games';
    bg.style.display = 'none';
    renderGames();
  } else if (state.view === 'tracks') {
    title.textContent = state.game; sub.textContent = 'Strecken';
    const img = currentGame().image;
    if (img) { bg.style.display = ''; bgImg.src = img; } else bg.style.display = 'none';
    renderTracks();
  } else {
    title.textContent = state.track; sub.textContent = 'Rundenzeiten';
    const img = currentTrack().image;
    if (img) { bg.style.display = ''; bgImg.src = img; } else bg.style.display = 'none';
    renderLaps();
  }
}

function renderGames() {
  const sc = document.getElementById('screen');
  const games = state.data.games;
  let html = '<div class="section-label">Meine Spiele</div>';
  if (!Object.keys(games).length) {
    html += `<div class="empty"><div class="empty-icon">🎮</div><div class="empty-text">Noch keine Spiele</div><div class="empty-sub">Tippe auf + um ein Spiel hinzuzufügen</div></div>`;
  } else {
    for (const [name, g] of Object.entries(games)) {
      const tc = Object.keys(g.tracks || {}).length;
      const lc = Object.values(g.tracks || {}).reduce((s, t) => s + (t.laps||[]).length, 0);
      html += `<div class="card" onclick="navigate('tracks','${esc(name)}')">
        <div class="card-title">${esc(name)}</div>
        <div class="card-sub">${tc} Strecken · ${lc} Rundenzeiten</div>
        <div class="card-arrow">›</div>
      </div>`;
    }
  }
  sc.innerHTML = html;
  renderFab('openGameModal()');
}

function renderTracks() {
  const sc = document.getElementById('screen');
  const tracks = currentGame().tracks || {};
  let html = '<div class="section-label">Strecken</div>';
  if (!Object.keys(tracks).length) {
    html += `<div class="empty"><div class="empty-icon">🗺️</div><div class="empty-text">Noch keine Strecken</div><div class="empty-sub">Tippe auf + um eine Strecke hinzuzufügen</div></div>`;
  } else {
    for (const [name, t] of Object.entries(tracks)) {
      const laps = [...(t.laps||[])].sort((a,b) => a.timeMs - b.timeMs);
      const best = laps[0];
      html += `<div class="card" onclick="navigate('laps',undefined,'${esc(name)}')">
        <div class="card-title">${esc(name)}</div>
        <div class="card-sub">${laps.length} Zeiten${best ? ` · Bestzeit: <strong style="color:var(--gold)">${formatTime(best.timeMs)}</strong>` : ''}</div>
        <div class="card-arrow">›</div>
      </div>`;
    }
  }
  sc.innerHTML = html;
  renderFab('openTrackModal()');
}

function renderLaps() {
  const sc = document.getElementById('screen');
  const laps = [...(currentTrack().laps || [])].sort((a,b) => a.timeMs - b.timeMs);
  let html = '<div class="section-label">Sortiert nach Bestzeit</div>';
  if (!laps.length) {
    html += `<div class="empty"><div class="empty-icon">⏱️</div><div class="empty-text">Noch keine Rundenzeiten</div><div class="empty-sub">Tippe auf + um eine Zeit einzutragen</div></div>`;
  } else {
    laps.forEach((lap, i) => {
      const gold = i === 0;
      html += `<div class="laptime-card${gold ? ' gold' : ''}">
        <div class="laptime-rank${gold ? ' gold' : ''}">${gold ? '🏆 BESTZEIT' : '#' + (i+1)}</div>
        <div class="laptime-time${gold ? ' gold' : ''}">${formatTime(lap.timeMs)}</div>
        <div class="laptime-car">${esc(lap.car)}</div>
        <div class="tags">
          ${driveTag(lap.drivetrain)}
          <span class="tag tag-stat">💪 ${lap.hp} PS</span>
          <span class="tag tag-stat">🔩 ${lap.nm} NM</span>
          ${lap.tuned ? '<span class="tag tag-tuned">⚙️ GETUNT</span>' : ''}
          <span class="tag tag-weather">${lap.weather}</span>
        </div>
        <div class="lap-actions">
          <button class="lap-btn lap-btn-edit" onclick="openEditLapModal(${lap.id})">✏ Bearbeiten</button>
          <button class="lap-btn lap-btn-del" onclick="deleteLap(${lap.id})">✕ Löschen</button>
        </div>
      </div>`;
    });
  }
  sc.innerHTML = html;
  renderFab('openLapModal()');
}

function renderFab(action) {
  const existing = document.querySelector('.fab');
  if (existing) existing.remove();
  const btn = document.createElement('button');
  btn.className = 'fab'; btn.textContent = '+';
  btn.setAttribute('onclick', action);
  document.getElementById('app').appendChild(btn);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════
// MODAL ENGINE
// ═══════════════════════════════════════════
let modalForm = {};

function openOverlay(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  modalForm = {};
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

// ── IMAGE UPLOAD HELPER ──
function handleImgChange(inputEl) {
  const file = inputEl.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    modalForm.image = e.target.result;
    // Show preview
    const area = inputEl.closest('.img-upload-area');
    area.innerHTML = `
      <div class="img-preview-wrap">
        <img class="img-preview" src="${e.target.result}" alt="Vorschau">
        <button class="img-remove" onclick="clearImage(this)">✕</button>
      </div>`;
  };
  reader.readAsDataURL(file);
}
function clearImage(btn) {
  modalForm.image = null;
  const area = btn.closest('.img-upload-area') || btn.closest('.img-preview-wrap').parentElement;
  area.outerHTML = imageUploadField('Bild auswählen', '🖼️');
}
function imageUploadField(label, icon) {
  return `<div class="img-upload-area">
    <div class="img-upload-visual">
      <span class="img-upload-icon">${icon}</span>
      <span class="img-upload-text">${label}</span>
    </div>
    <input type="file" accept="image/*" onchange="handleImgChange(this)">
  </div>`;
}
function imagePreviewField(src) {
  return `<div class="img-upload-area">
    <div class="img-preview-wrap">
      <img class="img-preview" src="${src}" alt="Vorschau">
      <button class="img-remove" onclick="clearImage(this)">✕</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// GAME MODAL
// ═══════════════════════════════════════════
function openGameModal() {
  modalForm = {};
  openOverlay(`
    <div class="modal-title">🎮 Neues <em>Spiel</em></div>
    <div class="fg">
      <label class="fl">Spielname</label>
      <input class="fi" id="mGameName" placeholder="z.B. Gran Turismo 7" oninput="modalForm.name=this.value">
    </div>
    <div class="fg">
      <label class="fl">Hintergrundbild (optional)</label>
      ${imageUploadField('Bild auswählen', '🖼️')}
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveGame()">SPEICHERN</button>
    </div>`);
}

function saveGame() {
  const name = (modalForm.name || document.getElementById('mGameName')?.value || '').trim();
  if (!name) { showToast('⚠️ Bitte einen Spielnamen eingeben'); return; }
  if (state.data.games[name]) { showToast('⚠️ Spiel existiert bereits'); return; }
  state.data.games[name] = { tracks: {}, image: modalForm.image || null };
  saveData(); closeModal(); render(); showToast('✓ Spiel gespeichert');
}

// ═══════════════════════════════════════════
// TRACK MODAL
// ═══════════════════════════════════════════
function openTrackModal() {
  modalForm = {};
  openOverlay(`
    <div class="modal-title">🗺️ Neue <em>Strecke</em></div>
    <div class="fg">
      <label class="fl">Streckenname</label>
      <input class="fi" id="mTrackName" placeholder="z.B. Nürburgring GP" oninput="modalForm.name=this.value">
    </div>
    <div class="fg">
      <label class="fl">Streckenlayout (optional)</label>
      ${imageUploadField('Streckenlayout hochladen', '🏁')}
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveTrack()">SPEICHERN</button>
    </div>`);
}

function saveTrack() {
  const name = (modalForm.name || document.getElementById('mTrackName')?.value || '').trim();
  if (!name) { showToast('⚠️ Bitte einen Streckennamen eingeben'); return; }
  const g = state.data.games[state.game];
  if (!g) return;
  if (!g.tracks) g.tracks = {};
  if (g.tracks[name]) { showToast('⚠️ Strecke existiert bereits'); return; }
  g.tracks[name] = { laps: [], image: modalForm.image || null };
  saveData(); closeModal(); render(); showToast('✓ Strecke gespeichert');
}

// ═══════════════════════════════════════════
// LAP MODAL
// ═══════════════════════════════════════════
function lapFormHTML(f) {
  const wOpts = WEATHER.map(w => {
    const [emoji, ...rest] = w.split(' ');
    return `<button class="wbtn${(f.weather||'☀️ Sonnig')===w?' active':''}" onclick="setWeather('${w}',this)">
      <span class="we">${emoji}</span>${rest.join(' ')}
    </button>`;
  }).join('');
  const dOpts = DRIVES.map(d =>
    `<button class="rbtn${(f.drivetrain||'RWD')===d?' active':''}" onclick="setDrive('${d}',this)">${d}</button>`
  ).join('');
  return `
    <div class="fg">
      <label class="fl">Rundenzeit (M:SS.mmm)</label>
      <input class="fi" id="mTime" placeholder="z.B. 1:32.450" value="${f.time||''}" oninput="modalForm.time=this.value">
    </div>
    <div class="fg">
      <label class="fl">Fahrzeug</label>
      <input class="fi" id="mCar" placeholder="z.B. Mazda RX-7 Spirit R" value="${esc(f.car||'')}" oninput="modalForm.car=this.value">
    </div>
    <div class="fg row2">
      <div>
        <label class="fl">Leistung (PS)</label>
        <input class="fi" type="number" id="mHp" placeholder="280" value="${f.hp||''}" oninput="modalForm.hp=this.value">
      </div>
      <div>
        <label class="fl">Drehmoment (NM)</label>
        <input class="fi" type="number" id="mNm" placeholder="320" value="${f.nm||''}" oninput="modalForm.nm=this.value">
      </div>
    </div>
    <div class="fg">
      <label class="fl">Antrieb</label>
      <div class="radio-group">${dOpts}</div>
    </div>
    <div class="fg">
      <label class="fl">Wetter</label>
      <div class="weather-grid">${wOpts}</div>
    </div>
    <div class="fg">
      <label class="fl">Getunt?</label>
      <div class="toggle-row">
        <span id="tunedLabel" style="font-size:14px;color:${f.tuned?'var(--gold)':'#666'}">${f.tuned?'⚙️ Ja, getunt':'Nein, Serienfahrzeug'}</span>
        <button class="tgl${f.tuned?' on':''}" id="tunedTgl" onclick="toggleTuned(this)"></button>
      </div>
    </div>`;
}

function setWeather(w, el) {
  modalForm.weather = w;
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function setDrive(d, el) {
  modalForm.drivetrain = d;
  document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function toggleTuned(btn) {
  modalForm.tuned = !modalForm.tuned;
  btn.classList.toggle('on', modalForm.tuned);
  const lbl = document.getElementById('tunedLabel');
  lbl.textContent = modalForm.tuned ? '⚙️ Ja, getunt' : 'Nein, Serienfahrzeug';
  lbl.style.color = modalForm.tuned ? 'var(--gold)' : '#666';
}

function openLapModal() {
  modalForm = { drivetrain: 'RWD', weather: '☀️ Sonnig', tuned: false };
  openOverlay(`
    <div class="modal-title">⏱️ Neue <em>Rundenzeit</em></div>
    ${lapFormHTML(modalForm)}
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveLap()">SPEICHERN</button>
    </div>`);
}

function openEditLapModal(id) {
  const lap = (currentTrack().laps || []).find(l => l.id === id);
  if (!lap) return;
  const mins = Math.floor(lap.timeMs / 60000);
  const secs = ((lap.timeMs % 60000) / 1000).toFixed(3).padStart(6, '0');
  modalForm = {
    editId: id,
    time: `${mins}:${secs}`,
    car: lap.car, hp: lap.hp, nm: lap.nm,
    drivetrain: lap.drivetrain, weather: lap.weather, tuned: lap.tuned
  };
  openOverlay(`
    <div class="modal-title">✏️ <em>Bearbeiten</em></div>
    ${lapFormHTML(modalForm)}
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveLap()">AKTUALISIEREN</button>
    </div>`);
}

function saveLap() {
  const time = (modalForm.time || document.getElementById('mTime')?.value || '').trim();
  const car = (modalForm.car || document.getElementById('mCar')?.value || '').trim();
  const hp = parseInt(modalForm.hp || document.getElementById('mHp')?.value) || 0;
  const nm = parseInt(modalForm.nm || document.getElementById('mNm')?.value) || 0;
  if (!time) { showToast('⚠️ Bitte eine Rundenzeit eingeben'); return; }
  if (!car) { showToast('⚠️ Bitte ein Fahrzeug eingeben'); return; }
  const ms = parseTimeStr(time);
  if (isNaN(ms) || ms <= 0) { showToast('⚠️ Ungültiges Zeitformat (z.B. 1:32.450)'); return; }

  const track = currentTrack();
  if (!track.laps) track.laps = [];

  if (modalForm.editId !== undefined) {
    const idx = track.laps.findIndex(l => l.id === modalForm.editId);
    if (idx >= 0) track.laps[idx] = { ...track.laps[idx], car, hp, nm, timeMs: ms, drivetrain: modalForm.drivetrain||'RWD', weather: modalForm.weather||'☀️ Sonnig', tuned: !!modalForm.tuned };
    showToast('✓ Rundenzeit aktualisiert');
  } else {
    track.laps.push({ id: state.data.nextId++, car, hp, nm, timeMs: ms, drivetrain: modalForm.drivetrain||'RWD', weather: modalForm.weather||'☀️ Sonnig', tuned: !!modalForm.tuned });
    showToast('✓ Rundenzeit gespeichert');
  }
  saveData(); closeModal(); render();
}

function deleteLap(id) {
  const track = currentTrack();
  if (!track.laps) return;
  track.laps = track.laps.filter(l => l.id !== id);
  saveData(); render(); showToast('✓ Gelöscht');
}

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
render();
</script>
</body>
</html>
